[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.27"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
fs_permissions = [{ access = "read-write", path = "out" }, { access = "read", path = "deployed-addresses.json" }]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[fuzz]
runs = 1000
