[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.27"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
# Optional: Tenderly Sepolia fork RPC for testing
# tenderly_fork = "${TENDERLY_FORK_RPC_URL}"

[fuzz]
runs = 1000

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
